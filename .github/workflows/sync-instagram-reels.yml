name: Sync Instagram reels

on:
  schedule:
    # Every 6 hours — the Graph API gives a real-time view, but IG token quotas
    # are modest, so we don't poll more aggressively.
    - cron: '15 */6 * * *'
  workflow_dispatch: # manual run from the Actions tab

concurrency:
  group: sync-instagram-reels
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Fetch reels and upsert into public.shorts
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          IG_USER_ID:                ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:           ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          if [ -z "$IG_USER_ID" ] || [ -z "$IG_ACCESS_TOKEN" ]; then
            echo "::warning::IG_USER_ID or IG_ACCESS_TOKEN secret missing — skipping. See scripts/sync-instagram-reels.mjs for setup."
            exit 0
          fi
          node scripts/sync-instagram-reels.mjs
