name: Update market tickers

on:
  schedule:
    # GitHub Actions cron runs at most every 5 minutes on free tier.
    # (Schedules are best-effort — actual runs may be delayed under load.)
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual run from the Actions tab

# Cancel any in-flight run if a new one is queued.
concurrency:
  group: update-tickers
  cancel-in-progress: true

jobs:
  fetch-and-upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Fetch Yahoo Finance and upsert into market_tickers
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update-tickers.mjs
