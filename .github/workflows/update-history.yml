name: Update ticker history

on:
  schedule:
    # 13:00 UTC = 18:30 IST — after NSE/BSE close (15:30 IST) and after
    # US pre-market wakes up, so we capture a fresh close for everything.
    - cron: '0 13 * * *'
  workflow_dispatch: # manual run from the Actions tab

concurrency:
  group: update-history
  cancel-in-progress: true

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Fetch 3-month daily history and upsert
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/update-history.mjs
