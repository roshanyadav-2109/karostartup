<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading… · Karostartup</title>
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="chrome"></div>
  <main id="cat-main">
    <div class="loading-state">Loading…</div>
  </main>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script>
  (async () => {
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');
    if (!slug) { await mountChrome(''); mountFooter(); document.getElementById('cat-main').innerHTML = '<div class="empty-state" style="padding:120px 24px;"><h3>Category not found</h3><a href="/" class="btn btn-primary">Home</a></div>'; return; }

    let cat;
    try {
      const { data } = await sb.from('categories').select('*').eq('slug', slug).maybeSingle();
      cat = data;
    } catch {}

    await mountChrome(slug);
    mountFooter();

    if (!cat) {
      document.title = 'Not found · Karostartup';
      document.getElementById('cat-main').innerHTML = '<div class="empty-state" style="padding:120px 24px;"><h3>Category not found</h3><a href="/" class="btn btn-primary">Home</a></div>';
      return;
    }

    const catUrl = `${location.origin}/category/${encodeURIComponent(cat.slug)}`;
    setMeta({
      title: cat.name,
      description: cat.description || `${cat.name} — the latest from Karostartup.`,
      url: catUrl,
      canonical: catUrl,
      type: 'website',
      keywords: cat.name,
      jsonLd: [
        {
          '@context': 'https://schema.org',
          '@type': 'CollectionPage',
          name: cat.name,
          description: cat.description || null,
          url: catUrl,
          isPartOf: { '@type': 'WebSite', name: 'Karostartup', url: location.origin },
        },
        {
          '@context': 'https://schema.org',
          '@type': 'BreadcrumbList',
          itemListElement: [
            { '@type': 'ListItem', position: 1, name: 'Home', item: location.origin + '/' },
            { '@type': 'ListItem', position: 2, name: cat.name },
          ],
        },
      ],
    });

    const { count: totalCount } = await sbPublic.from('articles').select('id', { count: 'exact', head: true }).eq('status', 'published').eq('category_id', cat.id);

    document.getElementById('cat-main').innerHTML = `
      <div class="container">
        <section class="cnn-grid" id="cnn-grid">
          <div class="cnn-col cnn-col-left">
            <h3 class="cnn-col-head">Editor's Picks</h3>
            <div id="cnn-left"><div class="loading-state">Loading…</div></div>
          </div>
          <div class="cnn-col cnn-col-mid">
            <h3 class="cnn-col-head"><span class="live-dot"></span> Latest in ${escapeHtml(cat.name)}</h3>
            <div id="cnn-mid"><div class="loading-state">Loading…</div></div>
          </div>
          <div class="cnn-col cnn-col-right">
            <h3 class="cnn-col-head">More from ${escapeHtml(cat.name)}</h3>
            <div id="cnn-right"><div class="loading-state">Loading…</div></div>
            <form id="cat-subscribe" class="col-subscribe">
              <input type="email" name="email" placeholder="Subscribe via email" required aria-label="Email">
              <button type="submit">Subscribe</button>
              <div class="cat-sub-msg" id="cat-sub-msg"></div>
            </form>
          </div>
        </section>
      </div>

      <div class="container">
        <div class="filter-bar">
          <button class="filter-tab is-active" data-sort="latest">All stories</button>
          <button class="filter-tab" data-sort="most-read">Most Read · 30d</button>
          <button class="filter-tab" data-sort="top">Top Stories</button>
        </div>
        <div id="cat-grid" class="cat-archive-grid"><div class="loading-state" style="grid-column:1/-1;">Loading…</div></div>
        <div class="pagination" id="pagination"></div>
      </div>

      <div class="container">
        <section class="cat-bottom-strips">
          <div class="cat-bottom-block">
            <h3 class="cnn-col-head">Top brands in ${escapeHtml(cat.name)}</h3>
            <div id="cat-companies"><div class="loading-state">Loading…</div></div>
          </div>
          <div class="cat-bottom-block">
            <h3 class="cnn-col-head">Recent funding</h3>
            <div id="cat-funding"><div class="loading-state">Loading…</div></div>
          </div>
          <div class="cat-bottom-block">
            <h3 class="cnn-col-head">Browse other sections</h3>
            <ul class="trending-list" id="cat-related"></ul>
          </div>
        </section>
      </div>
    `;

    // Category newsletter subscribe
    (() => {
      const form = document.getElementById('cat-subscribe');
      const msg = document.getElementById('cat-sub-msg');
      if (!form) return;
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = form.email.value.trim();
        if (!email) return;
        msg.textContent = ''; msg.className = 'cat-sub-msg';
        const newsletterSlug = `cat-${cat.slug}`;
        try {
          // Find or create the per-category newsletter row.
          let { data: nl } = await sb.from('newsletters').select('id').eq('slug', newsletterSlug).maybeSingle();
          if (!nl) {
            const { data: created, error: cErr } = await sb.from('newsletters').insert({
              slug: newsletterSlug,
              name: `${cat.name} Weekly`,
              description: `The best ${cat.name} stories from Karostartup, every week.`,
              cadence: 'weekly',
              active: true,
            }).select('id').single();
            if (cErr) throw cErr;
            nl = created;
          }
          const { error } = await sb.from('newsletter_subscribers').insert({ email, newsletter_id: nl.id });
          if (error) {
            if (error.code === '23505') {
              msg.textContent = `You're already subscribed to ${cat.name} Weekly.`;
              msg.classList.add('success');
            } else {
              throw error;
            }
          } else {
            msg.textContent = `Subscribed. You'll get the next ${cat.name} brief on Monday.`;
            msg.classList.add('success');
            form.reset();
          }
        } catch (err) {
          msg.textContent = err.message || 'Could not subscribe right now.';
          msg.classList.add('error');
        }
      });
    })();

    // CNN-style 3-col top block — single query, distribute across columns
    try {
      const data = await cachedFetch('cat:' + cat.slug + ':cnn', 180, () => sbPublic.from('articles')
        .select('id,slug,title,kicker,subtitle,summary,cover_image_url,published_at,read_time_minutes,view_count,is_featured,categories(name,slug),profiles!author_id(full_name)')
        .eq('status', 'published')
        .eq('category_id', cat.id)
        .order('published_at', { ascending: false })
        .limit(14).then(r => r.data));

      if (!data || !data.length) {
        document.getElementById('cnn-mid').innerHTML = '<div class="empty-state"><h3>No stories in this section yet</h3><p>Check back soon.</p></div>';
        document.getElementById('cnn-left').innerHTML = '';
        document.getElementById('cnn-right').innerHTML = '';
      } else {
        // Lead = most recent featured if any, else the most recent overall
        const lead = data.find(a => a.is_featured) || data[0];
        const rest = data.filter(a => a.id !== lead.id);
        const middleMedium = rest.slice(0, 3);
        const leftSmall    = rest.slice(3, 6);
        const rightSmall   = rest.slice(6, 9);

        document.getElementById('cnn-mid').innerHTML = `
          <article class="cnn-lead">${renderStoryCard(lead)}</article>
          ${middleMedium.length ? `<div class="cnn-medium-stack">${middleMedium.map(a => `<article class="cnn-medium">${renderStoryCard(a, { small: true })}</article>`).join('')}</div>` : ''}
        `;
        document.getElementById('cnn-left').innerHTML  = leftSmall.length  ? leftSmall.map(renderSideCard).join('')  : '<span style="color:#9a9a9a;font-size:0.86rem;">Nothing else yet.</span>';
        document.getElementById('cnn-right').innerHTML = rightSmall.length ? rightSmall.map(renderSideCard).join('') : '<span style="color:#9a9a9a;font-size:0.86rem;">Nothing else yet.</span>';
      }
    } catch (e) {
      document.getElementById('cnn-mid').innerHTML = `<div class="empty-state"><p>${escapeHtml(e.message)}</p></div>`;
    }

    let page = 1;
    const PER = 12;
    let sort = 'latest';

    async function loadPage() {
      const grid = document.getElementById('cat-grid');
      grid.innerHTML = '<div class="loading-state">Loading…</div>';
      const from = (page - 1) * PER;
      const to = from + PER - 1;
      let q = sbPublic.from('articles')
        .select('id,slug,title,kicker,summary,cover_image_url,published_at,view_count,read_time_minutes,categories(name,slug),profiles!author_id(full_name)', { count: 'exact' })
        .eq('status', 'published')
        .eq('category_id', cat.id);
      if (sort === 'latest') q = q.order('published_at', { ascending: false });
      else if (sort === 'most-read') {
        const since = new Date(Date.now() - 30 * 86400000).toISOString();
        q = q.gte('published_at', since).order('view_count', { ascending: false });
      } else q = q.order('view_count', { ascending: false });
      try {
        const { data, count } = await q.range(from, to);
        if (!data || !data.length) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><h3>No stories yet</h3><p>Check back soon.</p></div>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }
        grid.innerHTML = data.map(a => renderStoryCard(a, { small: true })).join('');
        renderPagination(count || data.length);
        initReveal();
      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><h3>Could not load stories</h3></div>';
      }
    }

    function renderPagination(total) {
      const totalPages = Math.max(1, Math.ceil(total / PER));
      if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
      const parts = [];
      parts.push(`<button ${page === 1 ? 'disabled' : ''} data-page="prev">‹</button>`);
      for (let i = 1; i <= totalPages; i++) {
        if (i <= 2 || i > totalPages - 2 || Math.abs(i - page) <= 1) {
          parts.push(`<button data-page="${i}" ${i === page ? 'class="is-active"' : ''}>${i}</button>`);
        } else if (i === 3 && page > 4) parts.push('<button disabled>…</button>');
        else if (i === totalPages - 2 && page < totalPages - 3) parts.push('<button disabled>…</button>');
      }
      parts.push(`<button ${page === totalPages ? 'disabled' : ''} data-page="next">›</button>`);
      const pag = document.getElementById('pagination');
      pag.innerHTML = parts.join('');
      pag.querySelectorAll('button[data-page]').forEach(b => {
        b.addEventListener('click', () => {
          const v = b.dataset.page;
          if (v === 'prev') page = Math.max(1, page - 1);
          else if (v === 'next') page = Math.min(totalPages, page + 1);
          else page = Number(v);
          loadPage();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    document.querySelectorAll('.filter-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('is-active'));
        t.classList.add('is-active');
        sort = t.dataset.sort;
        page = 1;
        loadPage();
      });
    });

    loadPage();

    // Sidebar: top companies by sector matching name
    try {
      const { data: companies } = await sb.from('companies')
        .select('slug,name,logo_url,total_funding_usd')
        .ilike('sector', `%${cat.name}%`)
        .order('total_funding_usd', { ascending: false, nullsFirst: false })
        .limit(5);
      const slot = document.getElementById('cat-companies');
      if (companies && companies.length) {
        slot.innerHTML = companies.map(c => `
          <a href="/company/${encodeURIComponent(c.slug)}" style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e6e6e6;font-size:0.9rem;">
            <span style="font-weight:600;">${escapeHtml(c.name)}</span>
            <span class="mono" style="color:#d10a11;">${c.total_funding_usd ? formatUSD(c.total_funding_usd) : '—'}</span>
          </a>`).join('');
      } else slot.innerHTML = '<span style="color:#9a9a9a;font-size:0.86rem;">No companies tracked yet.</span>';
    } catch {}

    // Sidebar: top funding rounds in sector
    try {
      const { data: rounds } = await sb.from('funding_rounds')
        .select('round_type,amount_usd,amount_inr,announced_date,companies(name,slug,sector)')
        .order('amount_usd', { ascending: false, nullsFirst: false })
        .limit(10);
      const filtered = (rounds || []).filter(r => (r.companies?.sector || '').toLowerCase().includes((cat.name || '').toLowerCase())).slice(0, 5);
      const slot = document.getElementById('cat-funding');
      if (filtered.length) {
        slot.innerHTML = filtered.map(r => `
          <div style="padding:10px 0;border-bottom:1px solid #e6e6e6;">
            <a href="/company/${encodeURIComponent(r.companies.slug)}" style="font-weight:600;font-size:0.9rem;">${escapeHtml(r.companies.name)}</a>
            <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:0.78rem;color:#5a5a5a;">
              <span>${escapeHtml(r.round_type || '')}</span>
              <span class="mono" style="color:#d10a11;">${r.amount_inr ? formatINR(r.amount_inr) : formatUSD(r.amount_usd)}</span>
            </div>
          </div>`).join('');
      } else slot.innerHTML = '<span style="color:#9a9a9a;font-size:0.86rem;">No rounds tracked yet.</span>';
    } catch {}

    // Related categories
    try {
      const { data: cats } = await sb.from('categories').select('slug,name').neq('slug', slug).order('order_index').limit(6);
      const slot = document.getElementById('cat-related');
      slot.innerHTML = (cats || []).map(c => `<li><a href="/category/${encodeURIComponent(c.slug)}">${escapeHtml(c.name)}</a><span class="count">→</span></li>`).join('');
    } catch {}
  })();
  </script>
</body>
</html>
