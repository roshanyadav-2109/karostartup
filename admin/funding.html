<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Funding · Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    await renderAdminShell('funding', 'Funding rounds');

    const main = document.getElementById('admin-content');
    main.innerHTML = `
      <h1>Funding rounds</h1>
      <div class="admin-card">
        <div class="admin-card-head"><h3>Add a round</h3></div>
        <form id="new-form">
          <div class="form-row">
            <div class="form-field"><label>Company *</label>
              <select name="company_id" required id="company-sel"><option value="">Select…</option></select>
            </div>
            <div class="form-field"><label>Round *</label>
              <select name="round_type" required>
                ${['Pre-Seed','Seed','Pre-Series A','Series A','Series B','Series C','Series D','Series D+','Bridge','Debt','Acquisition','IPO'].map(r => `<option>${r}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Amount USD</label><input type="number" step="any" name="amount_usd"></div>
            <div class="form-field"><label>Amount INR</label><input type="number" step="any" name="amount_inr"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Date *</label><input type="date" name="announced_date" required></div>
            <div class="form-field"><label>Lead investor</label><input type="text" name="lead_investor"></div>
          </div>
          <div class="form-field"><label>Other investors (comma-sep)</label><input type="text" name="other_investors" placeholder="Sequoia, Accel, Lightspeed"></div>
          <div class="form-field"><label>Linked article (optional)</label>
            <select name="article_id" id="article-sel"><option value="">None</option></select>
          </div>
          <button type="submit" class="btn btn-primary">Add round</button>
        </form>
      </div>

      <div class="admin-card" style="padding:0;">
        <div class="admin-card-head" style="padding:18px 22px;margin-bottom:0;"><h3>All rounds</h3></div>
        <div id="rounds-table"><div class="loading-state">Loading…</div></div>
      </div>`;

    // Populate company + article selects
    const [{ data: companies }, { data: articles }] = await Promise.all([
      sb.from('companies').select('id,name').order('name'),
      sb.from('articles').select('id,title,published_at').eq('status', 'published').order('published_at', { ascending: false }).limit(200)
    ]);
    const coSel = document.getElementById('company-sel');
    (companies || []).forEach(c => coSel.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`);
    const artSel = document.getElementById('article-sel');
    (articles || []).forEach(a => artSel.innerHTML += `<option value="${a.id}">${escapeHtml(a.title)}</option>`);

    document.getElementById('new-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        company_id: fd.get('company_id'),
        round_type: fd.get('round_type'),
        amount_usd: fd.get('amount_usd') ? Number(fd.get('amount_usd')) : null,
        amount_inr: fd.get('amount_inr') ? Number(fd.get('amount_inr')) : null,
        announced_date: fd.get('announced_date'),
        lead_investor: fd.get('lead_investor') || null,
        other_investors: fd.get('other_investors') ? fd.get('other_investors').split(',').map(s => s.trim()).filter(Boolean) : null,
        article_id: fd.get('article_id') || null
      };
      try {
        const { error } = await sb.from('funding_rounds').insert(payload);
        if (error) throw error;
        showToast('Round added');
        e.target.reset();
        loadRounds();
      } catch (err) { showToast(err.message, 'error'); }
    });

    async function loadRounds() {
      const slot = document.getElementById('rounds-table');
      slot.innerHTML = '<div class="loading-state">Loading…</div>';
      try {
        const { data } = await sb.from('funding_rounds')
          .select('id,round_type,amount_usd,amount_inr,announced_date,lead_investor,other_investors,article_id,companies(name,slug)')
          .order('announced_date', { ascending: false })
          .limit(200);
        if (!data || !data.length) { slot.innerHTML = '<div class="empty-state"><p>No rounds yet.</p></div>'; return; }
        slot.innerHTML = `
          <table class="admin-table">
            <thead><tr><th>Company</th><th>Round</th><th>Date</th><th>Amount</th><th>Lead</th><th>Co-investors</th><th></th></tr></thead>
            <tbody>${data.map(r => `<tr>
              <td><a href="/company/view.html?slug=${encodeURIComponent(r.companies?.slug || '')}" style="font-weight:600;">${escapeHtml(r.companies?.name || '—')}</a></td>
              <td><span class="round-pill ${roundPillClass(r.round_type)}">${escapeHtml(r.round_type)}</span></td>
              <td class="mono" style="font-size:0.82rem;">${formatDate(r.announced_date)}</td>
              <td class="mono" style="font-weight:600;">${r.amount_inr ? formatINR(r.amount_inr) : formatUSD(r.amount_usd)}</td>
              <td>${escapeHtml(r.lead_investor || '—')}</td>
              <td style="font-size:0.82rem;color:#5a5a5a;">${(r.other_investors || []).slice(0, 3).map(escapeHtml).join(', ')}</td>
              <td><button class="danger" data-del="${r.id}" style="background:none;border:0;color:#d10a11;cursor:pointer;font-weight:600;">Delete</button></td>
            </tr>`).join('')}</tbody>
          </table>`;
        document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
          if (!confirm('Delete this round?')) return;
          await sb.from('funding_rounds').delete().eq('id', b.dataset.del);
          showToast('Deleted');
          loadRounds();
        }));
      } catch (e) {
        slot.innerHTML = `<div class="empty-state"><p>${escapeHtml(e.message)}</p></div>`;
      }
    }
    loadRounds();
  })();
  </script>
</body>
</html>
