<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tickers · Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    await renderAdminShell('tickers', 'Market tickers');

    const main = document.getElementById('admin-content');
    main.innerHTML = `
      <h1>Market tickers</h1>
      <div class="admin-card">
        <div class="admin-card-head"><h3>Add ticker</h3></div>
        <form id="new-form">
          <div class="form-row">
            <div class="form-field"><label>Symbol *</label><input type="text" name="symbol" required placeholder="NIFTY 50"></div>
            <div class="form-field"><label>Display name</label><input type="text" name="display_name" placeholder="Nifty 50"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Value</label><input type="number" step="any" name="value"></div>
            <div class="form-field"><label>Change</label><input type="number" step="any" name="change_value"></div>
            <div class="form-field"><label>Change %</label><input type="number" step="any" name="change_percent"></div>
          </div>
          <div class="form-field" style="max-width:200px;"><label>Order</label><input type="number" name="order_index" value="0"></div>
          <button type="submit" class="btn btn-primary">Add</button>
        </form>
      </div>

      <div class="admin-card" style="padding:0;">
        <div class="admin-card-head" style="padding:18px 22px;margin-bottom:0;"><h3>All tickers · inline-editable</h3></div>
        <div id="ticker-table"><div class="loading-state">Loading…</div></div>
      </div>`;

    async function load() {
      const slot = document.getElementById('ticker-table');
      try {
        const { data } = await sb.from('market_tickers').select('*').order('order_index');
        if (!data || !data.length) { slot.innerHTML = '<div class="empty-state"><p>No tickers yet.</p></div>'; return; }
        slot.innerHTML = `
          <table class="admin-table">
            <thead><tr><th>Order</th><th>Symbol</th><th>Name</th><th>Value</th><th>Change</th><th>%</th><th>Updated</th><th></th></tr></thead>
            <tbody>${data.map(t => `<tr data-id="${t.id}">
              <td><input type="number" data-field="order_index" value="${t.order_index||0}" style="width:60px;border:1px solid #e6e6e6;padding:4px;"></td>
              <td><strong>${escapeHtml(t.symbol)}</strong></td>
              <td><input type="text" data-field="display_name" value="${escapeAttr(t.display_name||'')}" style="border:1px solid #e6e6e6;padding:4px;width:160px;"></td>
              <td><input type="number" step="any" data-field="value" value="${t.value||''}" class="mono" style="border:1px solid #e6e6e6;padding:4px;width:100px;"></td>
              <td><input type="number" step="any" data-field="change_value" value="${t.change_value||''}" class="mono" style="border:1px solid #e6e6e6;padding:4px;width:80px;"></td>
              <td><input type="number" step="any" data-field="change_percent" value="${t.change_percent||''}" class="mono" style="border:1px solid #e6e6e6;padding:4px;width:80px;"></td>
              <td class="mono" style="font-size:0.74rem;color:#5a5a5a;">${timeAgo(t.updated_at)}</td>
              <td><div class="row-actions">
                <button data-save="${t.id}" style="color:#0a7a3b;background:none;border:0;cursor:pointer;font-weight:600;">Save</button>
                <button class="danger" data-del="${t.id}" style="background:none;border:0;color:#d10a11;cursor:pointer;font-weight:600;">Delete</button>
              </div></td>
            </tr>`).join('')}</tbody>
          </table>`;
        document.querySelectorAll('[data-save]').forEach(b => b.addEventListener('click', async () => {
          const row = b.closest('tr');
          const payload = {};
          row.querySelectorAll('[data-field]').forEach(inp => {
            const val = inp.value;
            payload[inp.dataset.field] = inp.type === 'number' ? (val ? Number(val) : null) : val;
          });
          payload.updated_at = new Date().toISOString();
          try { await sb.from('market_tickers').update(payload).eq('id', b.dataset.save); showToast('Saved'); load(); }
          catch (e) { showToast(e.message, 'error'); }
        }));
        document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
          if (!confirm('Delete this ticker?')) return;
          await sb.from('market_tickers').delete().eq('id', b.dataset.del);
          showToast('Deleted');
          load();
        }));
      } catch (e) {
        slot.innerHTML = `<div class="empty-state"><p>${escapeHtml(e.message)}</p></div>`;
      }
    }

    document.getElementById('new-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        symbol: fd.get('symbol').trim(),
        display_name: fd.get('display_name') || fd.get('symbol').trim(),
        value: fd.get('value') ? Number(fd.get('value')) : null,
        change_value: fd.get('change_value') ? Number(fd.get('change_value')) : null,
        change_percent: fd.get('change_percent') ? Number(fd.get('change_percent')) : null,
        order_index: fd.get('order_index') ? Number(fd.get('order_index')) : 0
      };
      try { await sb.from('market_tickers').insert(payload); showToast('Added'); e.target.reset(); load(); }
      catch (err) { showToast(err.message, 'error'); }
    });

    load();
  })();
  </script>
</body>
</html>
