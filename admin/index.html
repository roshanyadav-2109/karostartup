<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading admin…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    await renderAdminShell('dashboard', 'Dashboard');
    const main = document.getElementById('admin-content');
    main.innerHTML = `
      <h1>Dashboard</h1>
      <div class="admin-stats" id="stats-slot"></div>
      <div style="display:grid;grid-template-columns:repeat(2, 1fr);gap:24px;">
        <div class="admin-card">
          <div class="admin-card-head"><h3>Recent submissions</h3><a href="/admin/submissions.html" class="btn btn-ghost btn-sm">View all →</a></div>
          <div id="submissions-slot"><div class="loading-state">Loading…</div></div>
        </div>
        <div class="admin-card">
          <div class="admin-card-head"><h3>Recent drafts</h3><a href="/admin/articles.html?status=draft" class="btn btn-ghost btn-sm">View all →</a></div>
          <div id="drafts-slot"><div class="loading-state">Loading…</div></div>
        </div>
        <div class="admin-card" style="grid-column:1/-1;">
          <div class="admin-card-head"><h3>Flagged comments</h3><a href="/admin/comments.html" class="btn btn-ghost btn-sm">View all →</a></div>
          <div id="comments-slot"><div class="loading-state">Loading…</div></div>
        </div>
      </div>`;

    // Stats
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const todayIso = today.toISOString();
    const [pub, drafts, total, sub] = await Promise.all([
      sb.from('articles').select('id', { count: 'exact', head: true }).eq('status', 'published').gte('published_at', todayIso),
      sb.from('articles').select('id', { count: 'exact', head: true }).eq('status', 'draft'),
      sb.from('articles').select('id', { count: 'exact', head: true }).eq('status', 'published'),
      sb.from('contact_submissions').select('id', { count: 'exact', head: true }).eq('status', 'new')
    ]);
    document.getElementById('stats-slot').innerHTML = `
      <div class="admin-stat"><div class="label">Published today</div><div class="value">${pub.count || 0}</div><div class="sub">Stories live since 00:00 IST</div></div>
      <div class="admin-stat"><div class="label">Drafts</div><div class="value">${drafts.count || 0}</div><div class="sub">In progress</div></div>
      <div class="admin-stat"><div class="label">Total published</div><div class="value">${total.count || 0}</div><div class="sub">All-time</div></div>
      <div class="admin-stat"><div class="label">New submissions</div><div class="value">${sub.count || 0}</div><div class="sub">Contact inbox</div></div>`;

    // Submissions
    try {
      const { data } = await sb.from('contact_submissions').select('id,name,company_name,type,subject,created_at').eq('status', 'new').order('created_at', { ascending: false }).limit(5);
      const slot = document.getElementById('submissions-slot');
      if (!data || !data.length) slot.innerHTML = '<div class="empty-state"><p>No new submissions.</p></div>';
      else slot.innerHTML = data.map(s => `
        <a href="/admin/submissions.html?id=${s.id}" style="display:block;padding:12px 0;border-bottom:1px solid #e6e6e6;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;"><strong style="font-size:0.92rem;">${escapeHtml(s.name)}${s.company_name ? ' · ' + escapeHtml(s.company_name) : ''}</strong><span style="font-size:0.72rem;color:#5a5a5a;font-family:var(--font-mono);">${timeAgo(s.created_at)}</span></div>
          <div style="display:flex;gap:8px;align-items:center;"><span class="type-pill ${s.type}">${escapeHtml(s.type)}</span><span style="font-size:0.86rem;color:#1a1a1a;">${escapeHtml(s.subject)}</span></div>
        </a>`).join('');
    } catch {}

    // Drafts
    try {
      const { data } = await sb.from('articles').select('id,title,updated_at,profiles!author_id(full_name)').eq('status', 'draft').order('updated_at', { ascending: false }).limit(5);
      const slot = document.getElementById('drafts-slot');
      if (!data || !data.length) slot.innerHTML = '<div class="empty-state"><p>No drafts.</p></div>';
      else slot.innerHTML = data.map(d => `
        <a href="/admin/article-edit.html?id=${d.id}" style="display:block;padding:12px 0;border-bottom:1px solid #e6e6e6;">
          <div style="font-weight:600;font-size:0.92rem;margin-bottom:4px;">${escapeHtml(d.title || 'Untitled')}</div>
          <div style="font-size:0.78rem;color:#5a5a5a;">${escapeHtml(d.profiles?.full_name || 'Unknown')} · ${timeAgo(d.updated_at)}</div>
        </a>`).join('');
    } catch {}

    // Flagged comments
    try {
      const { data } = await sb.from('comments').select('id,content,created_at,profiles(full_name),articles(title,slug)').eq('is_flagged', true).eq('is_deleted', false).order('created_at', { ascending: false }).limit(5);
      const slot = document.getElementById('comments-slot');
      if (!data || !data.length) slot.innerHTML = '<div class="empty-state"><p>No flagged comments.</p></div>';
      else slot.innerHTML = `<table class="admin-table"><thead><tr><th>Author</th><th>Content</th><th>Article</th><th>Time</th></tr></thead><tbody>${data.map(c => `<tr>
        <td>${escapeHtml(c.profiles?.full_name || 'Anonymous')}</td>
        <td style="max-width:340px;">${escapeHtml((c.content || '').slice(0, 120))}…</td>
        <td>${c.articles ? `<a href="/article/view.html?slug=${encodeURIComponent(c.articles.slug)}">${escapeHtml(c.articles.title)}</a>` : '—'}</td>
        <td class="mono" style="font-size:0.78rem;color:#5a5a5a;">${timeAgo(c.created_at)}</td>
      </tr>`).join('')}</tbody></table>`;
    } catch {}
  })();
  </script>
</body>
</html>
