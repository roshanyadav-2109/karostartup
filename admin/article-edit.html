<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Article · Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
  <style>
    .rt-toolbar { display:flex; flex-wrap:wrap; gap:4px; padding:6px; border:1px solid #0a0a0a; border-bottom:0; background:#fafaf8; }
    .rt-toolbar button { background:#fff; border:1px solid #d0d0c8; color:#0a0a0a; font:600 0.86rem/1 Inter, sans-serif; padding:6px 10px; cursor:pointer; border-radius:3px; }
    .rt-toolbar button:hover { background:#f0eee8; }
    .rt-toolbar button:active, .rt-toolbar button.is-active { background:#0a0a0a; color:#fff; border-color:#0a0a0a; }
    .rt-toolbar .rt-sep { width:1px; background:#d0d0c8; margin:2px 4px; }
    .rt-editor { min-height:380px; padding:14px 16px; border:1px solid #0a0a0a; background:#fff; font:400 1rem/1.6 'Source Serif 4', Georgia, serif; outline:none; overflow-wrap:break-word; }
    .rt-editor:focus { border-color:#d10a11; box-shadow:0 0 0 2px rgba(209,10,17,0.12); }
    .rt-editor p { margin:0 0 0.9em; }
    .rt-editor h2 { font:700 1.4rem/1.25 Inter, sans-serif; margin:1.1em 0 0.4em; }
    .rt-editor h3 { font:700 1.15rem/1.3 Inter, sans-serif; margin:1em 0 0.4em; }
    .rt-editor blockquote { margin:1em 0; padding:0.4em 0 0.4em 14px; border-left:3px solid #d10a11; color:#3a3a3a; font-style:italic; }
    .rt-editor ul, .rt-editor ol { margin:0 0 0.9em 1.4em; }
    .rt-editor a { color:#d10a11; text-decoration:underline; }
    .rt-editor:empty::before { content: attr(data-placeholder); color:#9a9a9a; pointer-events:none; }
    .rt-hint { color:#7a7a7a; font-size:0.78rem; margin-left:auto; }
    .editor-stats { display:flex; gap:14px; align-items:center; padding:6px 2px; font-size:0.78rem; color:#5a5a5a; flex-wrap:wrap; }
  </style>
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    const editId = new URLSearchParams(location.search).get('id');
    const isNew = !editId;
    await renderAdminShell('articles', isNew ? 'New article' : 'Edit article');
    const main = document.getElementById('admin-content');
    const me = await getCurrentProfile();

    // Load data
    let article = null;
    if (editId) {
      try {
        const { data } = await sb.from('articles').select('*').eq('id', editId).maybeSingle();
        article = data;
      } catch {}
      if (!article) {
        main.innerHTML = '<div class="empty-state"><h3>Article not found</h3><a href="/admin/articles.html" class="btn btn-primary">Back to list</a></div>';
        return;
      }
    } else {
      article = {
        title: '', slug: '', kicker: '', subtitle: '', summary: '', content: '',
        cover_image_url: '', cover_caption: '', tags: [],
        status: 'draft', is_editors_choice: false, is_featured: false, is_breaking: false, is_premium: false, is_exclusive: false,
        author_id: me?.id, category_id: null, published_at: null
      };
    }

    const [{ data: categories }, { data: authors }] = await Promise.all([
      sb.from('categories').select('id,name').order('order_index'),
      sb.from('profiles').select('id,full_name').in('role', ['author', 'editor', 'admin']),
    ]);

    main.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <h1 style="margin:0;">${isNew ? 'New article' : 'Edit article'}</h1>
        <div style="display:flex;gap:8px;">
          <a href="/admin/articles.html" class="btn btn-ghost btn-sm">Back</a>
          ${article.status === 'published' ? `<a href="/article/view.html?slug=${encodeURIComponent(article.slug)}" target="_blank" class="btn btn-ghost btn-sm">View live ↗</a>` : ''}
        </div>
      </div>
      <div id="msg-slot"></div>

      <div class="editor-grid">
        <div class="editor-main">
          <input type="text" id="title" class="editor-title-input form-field" placeholder="Headline…" value="${escapeAttr(article.title)}">
          <div class="form-field" style="margin-top:14px;">
            <label>Slug</label>
            <input type="text" id="slug" value="${escapeAttr(article.slug)}" placeholder="auto-generated">
            <div class="hint">Used in the URL. Auto-generated from title; you can edit.</div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Label (above headline)</label><input type="text" id="kicker" value="${escapeAttr(article.kicker||'')}" placeholder="e.g. EXCLUSIVE, FUNDING"></div>
            <div class="form-field"><label>Read time (auto)</label><input type="number" id="read_time" value="${article.read_time_minutes||''}" readonly style="background:#fafaf8;"></div>
          </div>
          <div class="form-field"><label>Subtitle / Dek</label><input type="text" id="subtitle" value="${escapeAttr(article.subtitle||'')}"></div>
          <div class="form-field">
            <label>Summary <span style="font-weight:400;color:#9a9a9a;">(optional)</span></label>
            <div class="rt-toolbar" id="summary-toolbar" style="border-bottom:0;">
              <button type="button" data-sumai title="Generate a summary from the content using AI" style="font-weight:700;color:#d10a11;">✦ Summarise</button>
              <span class="rt-sep"></span>
              <button type="button" data-sumlink title="Link selected text (Ctrl+K)">Link</button>
              <button type="button" data-sumcmd="insertUnorderedList" title="Bullet list">&bull; List</button>
              <button type="button" data-sumpreview title="Toggle preview">Preview</button>
            </div>
            <div id="summary_editor" class="rt-editor" contenteditable="true" data-placeholder="Short summary — select words and click Link to add a link." style="min-height:96px;border-top:0;font-size:1rem;line-height:1.6;"></div>
            <div id="summary_preview" class="article-summary" style="display:none;margin:10px 0 0;"><div class="article-summary-title">Summary</div><div id="summary_preview_body"></div></div>
            <div class="hint">Optional. Shows as a highlighted <strong>Summary</strong> box below the cover. Select words and click <strong>Link</strong> (or Ctrl+K) — the link shows inline, no brackets. Also used on cards and as the meta description.</div>
          </div>

          <div class="form-field">
            <label>Content</label>
            <div class="editor-tabs">
              <button type="button" class="editor-tab is-active" data-pane="write">Write</button>
              <button type="button" class="editor-tab" data-pane="preview">Preview</button>
            </div>
            <div id="write-pane">
              <div class="rt-toolbar" id="rt-toolbar">
                <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
                <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
                <button type="button" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
                <span class="rt-sep"></span>
                <button type="button" data-block="h2" title="Heading">H2</button>
                <button type="button" data-block="h3" title="Subheading">H3</button>
                <button type="button" data-block="p" title="Paragraph">¶</button>
                <button type="button" data-block="blockquote" title="Quote">&ldquo;&rdquo;</button>
                <span class="rt-sep"></span>
                <button type="button" data-cmd="insertUnorderedList" title="Bulleted list">&bull; List</button>
                <button type="button" data-cmd="insertOrderedList" title="Numbered list">1. List</button>
                <span class="rt-sep"></span>
                <button type="button" data-link title="Link selected text (Ctrl+K)">Link</button>
                <button type="button" data-cmd="removeFormat" title="Clear formatting">Clear</button>
              </div>
              <div id="content_editor" class="rt-editor" contenteditable="true" spellcheck="true"></div>
              <div class="editor-stats"><span id="word-count">0 words</span><span id="est-read">~0 min read</span><span class="rt-hint">Paste a YouTube or Vimeo link anywhere — it embeds automatically.</span></div>
            </div>
            <div id="preview-pane" class="preview-panel" style="display:none;"></div>
          </div>

          <div class="form-field">
            <label>Cover image</label>
            <input type="file" id="cover_file" accept="image/*">
            <input type="hidden" id="cover_image_url" value="${escapeAttr(article.cover_image_url||'')}">
            <div id="cover_preview" style="margin-top:10px;">${article.cover_image_url ? `<img src="${escapeAttr(article.cover_image_url)}" style="max-width:260px;border-radius:6px;display:block;">` : ''}</div>
            <div class="hint" id="cover_hint">Upload an image — it's stored on Cloudinary.</div>
          </div>
          <div class="form-field"><label>Cover caption</label><input type="text" id="cover_caption" value="${escapeAttr(article.cover_caption||'')}"></div>

          <div class="form-field">
            <label>Tags (comma-separated)</label>
            <input type="text" id="tags" value="${escapeAttr((article.tags||[]).join(', '))}">
          </div>

        </div>

        <div class="editor-side">
          <div class="admin-card">
            <div class="admin-card-head"><h3>Publish</h3></div>
            <div class="editor-actions">
              <button class="btn btn-primary" data-action="save">Save draft</button>
              <button class="btn btn-ghost" data-action="review">Submit for review</button>
              <button class="btn btn-red" data-action="publish">${article.status === 'published' ? 'Update & republish' : 'Publish'}</button>
              ${article.status === 'published' ? '<button class="btn btn-danger" data-action="unpublish">Unpublish</button>' : ''}
            </div>
            <div style="margin-top:12px;font-size:0.82rem;color:#5a5a5a;">Current: ${statusPill(article.status)}</div>
          </div>

          ${article.source === 'pib' ? `
          <div class="admin-card">
            <div class="admin-card-head"><h3>Auto-fetch override</h3></div>
            <label style="display:flex;gap:10px;align-items:flex-start;font-size:0.84rem;cursor:pointer;line-height:1.4;">
              <input type="checkbox" id="approved_for_public" ${article.approved_for_public ? 'checked' : ''} style="margin-top:3px;flex:0 0 auto;">
              <span>Show to the public even while auto-fetch is off. This is a PIB auto-fetched article — tick this after fixing its image/text to push it live on its own.</span>
            </label>
          </div>` : ''}

          <div class="admin-card">
            <div class="admin-card-head"><h3>Category</h3></div>
            <select id="category_id" style="width:100%;padding:8px;border:1px solid #0a0a0a;">
              <option value="">Uncategorized</option>
              ${(categories || []).map(c => `<option value="${c.id}" ${c.id === article.category_id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
            </select>
          </div>

          <div class="admin-card">
            <div class="admin-card-head"><h3>Author</h3></div>
            <select id="author_id" style="width:100%;padding:8px;border:1px solid #0a0a0a;">
              ${(authors || []).map(a => `<option value="${a.id}" ${a.id === (article.author_id || me?.id) ? 'selected' : ''}>${escapeHtml(a.full_name || '—')}</option>`).join('')}
            </select>
          </div>

          <div class="admin-card">
            <div class="admin-card-head"><h3>Published at</h3></div>
            <input type="datetime-local" id="published_at" value="${article.published_at ? new Date(article.published_at).toISOString().slice(0, 16) : ''}" style="width:100%;padding:8px;border:1px solid #0a0a0a;">
          </div>

          <div class="admin-card">
            <div class="admin-card-head"><h3>Flags</h3></div>
            <div class="checkbox-group">
              <label><input type="checkbox" id="is_editors_choice" ${article.is_editors_choice ? 'checked' : ''}> Editor's Choice</label>
              <label><input type="checkbox" id="is_featured" ${article.is_featured ? 'checked' : ''}> Featured</label>
              <label><input type="checkbox" id="is_breaking" ${article.is_breaking ? 'checked' : ''}> Breaking</label>
              <label><input type="checkbox" id="is_premium" ${article.is_premium ? 'checked' : ''}> Plus (premium)</label>
              <label><input type="checkbox" id="is_exclusive" ${article.is_exclusive ? 'checked' : ''}> Exclusive</label>
            </div>
          </div>
        </div>
      </div>`;

    // Cover image upload → covers bucket → fill hidden URL
    const coverFile = document.getElementById('cover_file');
    coverFile.addEventListener('change', async () => {
      const file = coverFile.files[0];
      if (!file) return;
      const hint = document.getElementById('cover_hint');
      hint.textContent = 'Uploading…';
      try {
        // Upload straight to Cloudinary via an unsigned preset (no secret in the browser).
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', 'karostartup_unsigned');
        const res = await fetch('https://api.cloudinary.com/v1_1/dliblumqq/image/upload', { method: 'POST', body: fd });
        const j = await res.json();
        if (!res.ok || !j.secure_url) throw new Error(j.error?.message || 'Cloudinary upload failed');
        const url = j.secure_url.replace('/image/upload/', '/image/upload/f_auto,q_auto/');
        document.getElementById('cover_image_url').value = url;
        document.getElementById('cover_preview').innerHTML = `<img src="${escapeAttr(url)}" style="max-width:260px;border-radius:6px;display:block;">`;
        hint.textContent = 'Uploaded ✓';
      } catch (e) {
        hint.textContent = 'Upload failed: ' + (e.message || e);
      }
    });

    // Auto-slug from title
    const titleEl = document.getElementById('title');
    const slugEl = document.getElementById('slug');
    let slugTouched = !!article.slug;
    slugEl.addEventListener('input', () => { slugTouched = true; });
    titleEl.addEventListener('input', () => {
      if (!slugTouched) slugEl.value = slugify(titleEl.value);
    });

    // Rich-text editor
    const contentEl = document.getElementById('content_editor');
    contentEl.setAttribute('data-placeholder', 'Start writing your story…');
    try { document.execCommand('defaultParagraphSeparator', false, 'p'); } catch {}
    // Seed editor: existing HTML loads as-is; legacy markdown is rendered to HTML so the writer never sees markup.
    (function seedEditor() {
      const raw = (article.content || '').trim();
      if (!raw) { contentEl.innerHTML = ''; return; }
      if (/^<(p|div|h[1-6]|ul|ol|table|blockquote|img|figure|section|article)\b/i.test(raw)) {
        contentEl.innerHTML = raw;
      } else {
        contentEl.innerHTML = renderMarkdown(raw);
      }
    })();

    const wordCountEl = document.getElementById('word-count');
    const readEl = document.getElementById('est-read');
    const readInput = document.getElementById('read_time');
    function getContentText() { return (contentEl.innerText || contentEl.textContent || '').replace(/ /g, ' '); }
    function recount() {
      const words = getContentText().trim().split(/\s+/).filter(Boolean).length;
      const mins = Math.max(1, Math.round(words / 200));
      wordCountEl.textContent = `${words} words`;
      readEl.textContent = `~${mins} min read`;
      readInput.value = mins;
    }
    contentEl.addEventListener('input', recount);
    recount();

    // Toolbar
    const toolbar = document.getElementById('rt-toolbar');
    function focusEditor() { contentEl.focus(); }
    function exec(cmd, val) { focusEditor(); try { document.execCommand(cmd, false, val ?? null); } catch {} recount(); }
    toolbar.addEventListener('mousedown', (e) => { if (e.target.closest('button')) e.preventDefault(); }); // keep selection
    toolbar.addEventListener('click', (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      if (btn.dataset.cmd) return exec(btn.dataset.cmd);
      if (btn.dataset.block) return exec('formatBlock', btn.dataset.block);
      if (btn.hasAttribute('data-link')) return insertLink();
    });

    // Link insertion — works on a selection (link the chosen word/phrase) and
    // via Ctrl/Cmd+K. The selection must be captured BEFORE prompt() because
    // opening the dialog collapses it, which previously made "link a word" fail.
    function saveRange() { const s = window.getSelection(); return (s && s.rangeCount) ? s.getRangeAt(0).cloneRange() : null; }
    function restoreRange(r) { if (!r) return; const s = window.getSelection(); s.removeAllRanges(); s.addRange(r); }
    function normUrl(u) {
      u = String(u).trim();
      if (!u) return '';
      if (/^(https?:|mailto:|tel:|\/|#)/i.test(u)) return u;
      return 'https://' + u;
    }
    function insertLink(el) {
      el = el || contentEl;
      const saved = saveRange();
      const selectedText = saved && !saved.collapsed ? saved.toString().trim() : '';
      const url = prompt(selectedText ? `Link for “${selectedText}”` : 'Link URL (https://…)');
      el.focus();
      restoreRange(saved);
      if (!url) return;
      const href = normUrl(url);
      if (selectedText) {
        document.execCommand('createLink', false, href);
      } else {
        document.execCommand('insertHTML', false, `<a href="${escHtml(href)}" target="_blank" rel="noopener">${escHtml(url.trim())}</a>&nbsp;`);
      }
      // execCommand('createLink') doesn't set target/rel — apply to every anchor.
      el.querySelectorAll('a').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });
      if (el === contentEl) recount();
    }
    contentEl.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); insertLink(contentEl); }
    });

    // Summary — a small rich editor so links show inline (no [text](url)).
    // Stored as HTML; plainText() strips it back to text on cards/meta.
    const summaryEl = document.getElementById('summary_editor');
    (function seedSummary() {
      const raw = (article.summary || '').trim();
      if (!raw) { summaryEl.innerHTML = ''; return; }
      if (/<[a-z][\s\S]*>/i.test(raw)) { summaryEl.innerHTML = raw; return; } // already HTML
      // legacy markdown/plain text → render to HTML so the box looks the same
      const f = (t) => t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/(^|[\s(])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener">$2</a>');
      const lines = raw.split(/\r?\n/).map(x => x.replace(/^[\s•\-\*]+/, '').trim()).filter(Boolean);
      summaryEl.innerHTML = lines.length > 1 ? `<ul>${lines.map(l => `<li>${f(l)}</li>`).join('')}</ul>` : `<p>${f(raw)}</p>`;
    })();
    const summaryToolbar = document.getElementById('summary-toolbar');
    const summaryPreview = document.getElementById('summary_preview');
    const summaryPreviewBody = document.getElementById('summary_preview_body');
    summaryToolbar.addEventListener('mousedown', (e) => { if (e.target.closest('button')) e.preventDefault(); });
    async function summariseWithAI(btn) {
      const contentText = (contentEl.innerText || contentEl.textContent || '').trim();
      if (contentText.length < 80) {
        alert('Write the article content first — there isn\'t enough text to summarise yet.');
        return;
      }
      // Confirmation popup — each click is one AI call.
      if (!confirm('Generate the summary from your content using AI?\n\nMake sure you\'ve finished writing the content — run this once it\'s ready. Each click uses one AI request. You can still edit or write the summary by hand afterwards.')) return;
      const orig = btn.textContent;
      btn.disabled = true; btn.textContent = '✦ Summarising…';
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) throw new Error('Your session expired — sign in again.');
        const r = await fetch('/api/ai/summarize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ title: titleEl.value.trim(), content: contentText }),
        });
        const j = await r.json();
        if (!r.ok || !j.ok) throw new Error(j.error || 'Could not generate a summary.');
        // Fill the summary editor (replaces existing — it's a fresh AI summary).
        summaryEl.innerHTML = `<p>${j.summary.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>`;
        if (summaryPreview.style.display !== 'none') summaryPreviewBody.innerHTML = summaryEl.innerHTML;
        showToast('Summary generated');
      } catch (err) {
        alert(err.message || 'Could not generate a summary.');
      } finally {
        btn.disabled = false; btn.textContent = orig;
      }
    }
    summaryToolbar.addEventListener('click', (e) => {
      const btn = e.target.closest('button'); if (!btn) return;
      if (btn.hasAttribute('data-sumai')) return summariseWithAI(btn);
      if (btn.hasAttribute('data-sumlink')) return insertLink(summaryEl);
      if (btn.dataset.sumcmd) { summaryEl.focus(); try { document.execCommand(btn.dataset.sumcmd); } catch {} return; }
      if (btn.hasAttribute('data-sumpreview')) {
        const showing = summaryPreview.style.display !== 'none';
        if (showing) { summaryPreview.style.display = 'none'; summaryEl.style.display = ''; btn.textContent = 'Preview'; }
        else { summaryPreviewBody.innerHTML = summaryEl.innerHTML || '<span style="color:#9a9a9a;">Nothing to preview yet.</span>'; summaryPreview.style.display = ''; summaryEl.style.display = 'none'; btn.textContent = 'Edit'; }
      }
    });
    summaryEl.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); insertLink(summaryEl); }
    });
    // YouTube / Vimeo detector — paste-aware. Returns the trimmed URL if the
    // entire pasted text is a video link, else null.
    const VIDEO_RE = /^https?:\/\/(?:www\.|m\.)?(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/|live\/)[\w-]+|youtu\.be\/[\w-]+|vimeo\.com\/\d+)\S*$/i;
    function detectVideoUrl(s) {
      const t = String(s || '').trim();
      return VIDEO_RE.test(t) ? t : null;
    }
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    // Keep paste clean — strip styles/scripts. If the pasted content is just a
    // video URL, drop it on its own paragraph so the published renderer embeds it.
    contentEl.addEventListener('paste', (e) => {
      e.preventDefault();
      const text = (e.clipboardData || window.clipboardData).getData('text/plain');
      const videoUrl = detectVideoUrl(text);
      if (videoUrl) {
        document.execCommand('insertHTML', false, `<p>${escHtml(videoUrl)}</p><p><br></p>`);
        recount();
        return;
      }
      const html = (e.clipboardData || window.clipboardData).getData('text/html');
      if (html) {
        const tmp = document.createElement('div'); tmp.innerHTML = html;
        tmp.querySelectorAll('script, style, meta, link, iframe').forEach(n => n.remove());
        tmp.querySelectorAll('*').forEach(n => { n.removeAttribute('style'); n.removeAttribute('class'); n.removeAttribute('id'); });
        document.execCommand('insertHTML', false, tmp.innerHTML);
      } else {
        document.execCommand('insertText', false, text);
      }
      recount();
    });

    // Tabs
    document.querySelectorAll('.editor-tab').forEach(t => t.addEventListener('click', () => {
      document.querySelectorAll('.editor-tab').forEach(x => x.classList.remove('is-active'));
      t.classList.add('is-active');
      const pane = t.dataset.pane;
      document.getElementById('write-pane').style.display = pane === 'write' ? 'block' : 'none';
      const preview = document.getElementById('preview-pane');
      preview.style.display = pane === 'preview' ? 'block' : 'none';
      if (pane === 'preview') preview.innerHTML = renderMarkdown(contentEl.innerHTML);
    }));

    const msgSlot = document.getElementById('msg-slot');
    function showMsg(html, type = 'success') {
      msgSlot.innerHTML = `<div class="form-msg ${type}">${html}</div>`;
      setTimeout(() => { msgSlot.innerHTML = ''; }, 4000);
    }

    async function save(action) {
      const title = titleEl.value.trim();
      let slug = slugEl.value.trim() || slugify(title);
      const content = (contentEl.innerHTML || '').trim();
      const contentText = getContentText().trim();
      if (action === 'publish' && (!title || !slug || !contentText)) {
        showMsg('Title, slug, and content are required to publish.', 'error');
        return;
      }
      const tags = document.getElementById('tags').value.split(',').map(s => s.trim()).filter(Boolean);
      const publishedAtInput = document.getElementById('published_at').value;
      let newStatus = article.status;
      let publishedAt = publishedAtInput ? new Date(publishedAtInput).toISOString() : article.published_at;
      if (action === 'save') newStatus = newStatus === 'published' ? 'published' : 'draft';
      else if (action === 'review') newStatus = 'review';
      else if (action === 'publish') {
        newStatus = 'published';
        if (!publishedAt) publishedAt = new Date().toISOString();
      } else if (action === 'unpublish') {
        newStatus = 'draft';
      }
      const payload = {
        title, slug,
        kicker: document.getElementById('kicker').value || null,
        subtitle: document.getElementById('subtitle').value || null,
        summary: (summaryEl.textContent || '').trim() ? summaryEl.innerHTML.trim() : null,
        content,
        cover_image_url: document.getElementById('cover_image_url').value || null,
        cover_caption: document.getElementById('cover_caption').value || null,
        tags: tags.length ? tags : null,
        category_id: document.getElementById('category_id').value || null,
        author_id: document.getElementById('author_id').value || me?.id,
        published_at: publishedAt,
        is_editors_choice: document.getElementById('is_editors_choice').checked,
        is_featured: document.getElementById('is_featured').checked,
        is_breaking: document.getElementById('is_breaking').checked,
        is_premium: document.getElementById('is_premium').checked,
        is_exclusive: document.getElementById('is_exclusive').checked,
        status: newStatus
      };
      // New articles created here are our own — mark them 'manual' so the
      // auto-fetch hide never affects them (the DB trigger respects this).
      if (isNew) payload.source = 'manual';
      // Per-article "push live" override, only present for PIB-sourced articles.
      const approvedEl = document.getElementById('approved_for_public');
      if (approvedEl) payload.approved_for_public = approvedEl.checked;
      try {
        let savedId = editId;
        if (isNew) {
          const { data, error } = await sb.from('articles').insert(payload).select('id').single();
          if (error) throw error;
          savedId = data.id;
        } else {
          // .select() so we can tell a real save from an RLS-blocked no-op
          // (a blocked update returns no error but changes 0 rows).
          const { data, error } = await sb.from('articles').update(payload).eq('id', editId).select('id');
          if (error) throw error;
          if (!data || !data.length) throw new Error("Nothing was saved — you may not have permission to edit this article, or your session expired. Try signing out and back in.");
        }
        showToast(action === 'publish' ? 'Published' : action === 'review' ? 'Sent for review' : action === 'unpublish' ? 'Unpublished' : 'Saved');
        article.status = newStatus;
        if (isNew && savedId) {
          location.href = `/admin/article-edit.html?id=${savedId}`;
        } else {
          showMsg('Saved.', 'success');
        }
      } catch (e) {
        showMsg(e.message || 'Save failed.', 'error');
      }
    }

    document.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', () => save(b.dataset.action)));
  })();
  </script>
</body>
</html>
