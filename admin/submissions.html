<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submissions · Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter+Tight:wght@300..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    await renderAdminShell('submissions', 'Contact submissions');

    const admin = await isAdmin();
    const main = document.getElementById('admin-content');
    main.innerHTML = `
      <h1 style="margin-bottom:18px;">Contact Inbox</h1>
      <div class="inbox">
        <div class="inbox-list" id="inbox-list">
          <div class="inbox-filters">
            <div class="filter-chips">
              <button class="filter-chip is-active" data-status="">All</button>
              <button class="filter-chip" data-status="new">New</button>
              <button class="filter-chip" data-status="reviewing">Reviewing</button>
              <button class="filter-chip" data-status="responded">Responded</button>
              <button class="filter-chip" data-status="closed">Closed</button>
            </div>
            <select id="type-filter">
              <option value="">All types</option>
              <option value="advertise">Promote / Advertise</option>
              <option value="tip">Tip</option>
              <option value="pr">PR</option>
              <option value="partnership">Partnership</option>
              <option value="careers">Careers</option>
              <option value="general">General</option>
            </select>
            <input type="search" id="search" placeholder="Search name, email, subject…">
          </div>
          <div id="list-items"><div class="loading-state">Loading…</div></div>
        </div>
        <div class="inbox-detail" id="inbox-detail">
          <div class="empty-state">
            <div class="icon" style="color:#5a5a5a;">${ICON.inbox}</div>
            <h3>Select a submission</h3>
            <p>Choose a message from the left to view it.</p>
          </div>
        </div>
      </div>`;

    let status = 'new', type = '', q = '', selectedId = new URLSearchParams(location.search).get('id') || null;

    // default to 'new' filter; also reflect "All" if URL had ?id
    if (selectedId) status = '';
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('is-active', c.dataset.status === status);
      c.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('is-active'));
        c.classList.add('is-active');
        status = c.dataset.status;
        load();
      });
    });
    document.getElementById('type-filter').addEventListener('change', (e) => { type = e.target.value; load(); });
    let st;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(st);
      st = setTimeout(() => { q = e.target.value.trim(); load(); }, 300);
    });

    async function load() {
      const slot = document.getElementById('list-items');
      slot.innerHTML = '<div class="loading-state">Loading…</div>';
      let qb = sb.from('contact_submissions').select('id,name,email,phone,subject,message,type,status,created_at');
      if (status) qb = qb.eq('status', status);
      if (type) qb = qb.eq('type', type);
      if (q) {
        const safe = q.replace(/[%_]/g, '');
        qb = qb.or(`name.ilike.%${safe}%,email.ilike.%${safe}%,subject.ilike.%${safe}%`);
      }
      qb = qb.order('created_at', { ascending: false }).limit(100);
      try {
        const { data } = await qb;
        if (!data || !data.length) { slot.innerHTML = '<div class="empty-state"><p style="padding:30px 14px;">No submissions match.</p></div>'; return; }
        slot.innerHTML = data.map(s => `
          <div class="inbox-item ${s.id === selectedId ? 'is-selected' : ''}" data-id="${s.id}">
            <div class="row1">
              <span class="name-co">${escapeHtml(s.name)}</span>
              <span class="time">${timeAgo(s.created_at)}</span>
            </div>
            <div class="pills">${typePill(s.type)}${statusPill(s.status)}</div>
            <div class="snippet">${escapeHtml(s.subject)} — ${escapeHtml((s.message || '').slice(0, 100))}</div>
          </div>`).join('');
        slot.querySelectorAll('.inbox-item').forEach(item => {
          item.addEventListener('click', () => {
            selectedId = item.dataset.id;
            slot.querySelectorAll('.inbox-item').forEach(i => i.classList.toggle('is-selected', i.dataset.id === selectedId));
            const u = new URL(location); u.searchParams.set('id', selectedId); history.replaceState({}, '', u);
            loadDetail(selectedId);
          });
        });

        if (selectedId) loadDetail(selectedId);
      } catch (e) {
        slot.innerHTML = `<div class="empty-state"><p style="padding:30px 14px;">${escapeHtml(e.message)}</p></div>`;
      }
    }

    async function loadDetail(id) {
      const detail = document.getElementById('inbox-detail');
      detail.innerHTML = '<div class="loading-state">Loading…</div>';
      try {
        const { data: s } = await sb.from('contact_submissions').select('*').eq('id', id).maybeSingle();
        if (!s) { detail.innerHTML = '<div class="empty-state"><h3>Not found</h3></div>'; return; }
        detail.innerHTML = `
          <div class="detail-header">
            <div>
              ${typePill(s.type)} ${statusPill(s.status)}
              <h2>${escapeHtml(s.subject || '(no subject)')}</h2>
              <div class="detail-meta">
                <span><strong style="color:#0a0a0a;">${escapeHtml(s.name)}</strong></span>
                <span>·</span>
                <a href="mailto:${encodeURIComponent(s.email)}">${escapeHtml(s.email)}</a>
                ${s.phone ? `<span>·</span><a href="tel:${encodeURIComponent(s.phone)}">${escapeHtml(s.phone)}</a>` : ''}
                <span>·</span>
                <span class="mono">${formatDateLong(s.created_at)} · ${formatTimeIST(s.created_at)}</span>
              </div>
            </div>
            <a class="btn btn-red btn-sm" href="mailto:${encodeURIComponent(s.email)}?subject=${encodeURIComponent('Re: ' + (s.subject || ''))}">Reply via email</a>
          </div>

          <div class="detail-block">
            <div class="label">Message</div>
            <div class="detail-message">${escapeHtml(s.message || '')}</div>
          </div>

          <div class="detail-actions">
            <div class="status-changer">
              ${['new','reviewing','responded','closed'].map(st => `<button data-set-status="${st}" ${s.status === st ? 'class="is-active"' : ''}>${st}</button>`).join('')}
            </div>
            ${admin ? `<button class="btn btn-danger btn-sm" data-del="${s.id}" style="margin-left:auto;">Delete</button>` : ''}
          </div>
        `;
        detail.querySelectorAll('[data-set-status]').forEach(b => b.addEventListener('click', async () => {
          try { await sb.from('contact_submissions').update({ status: b.dataset.setStatus }).eq('id', s.id); showToast('Status updated'); loadDetail(s.id); load(); }
          catch (e) { showToast(e.message, 'error'); }
        }));
        const delBtn = detail.querySelector('[data-del]');
        if (delBtn) delBtn.addEventListener('click', async () => {
          if (!confirm('Permanently delete this submission?')) return;
          try { await sb.from('contact_submissions').delete().eq('id', s.id); showToast('Deleted'); selectedId = null; const u = new URL(location); u.searchParams.delete('id'); history.replaceState({}, '', u); load(); }
          catch (e) { showToast(e.message, 'error'); }
        });
      } catch (e) {
        detail.innerHTML = `<div class="empty-state"><p>${escapeHtml(e.message)}</p></div>`;
      }
    }

    load();
  })();
  </script>
</body>
</html>
