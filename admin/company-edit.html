<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Company · Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter+Tight:wght@300..800&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    const id = new URLSearchParams(location.search).get('id');
    const isNew = !id;
    await renderAdminShell('companies', isNew ? 'New company' : 'Edit company');

    let c = null;
    if (id) {
      const { data } = await sb.from('companies').select('*').eq('id', id).maybeSingle();
      c = data;
    }
    if (!c) c = { name:'', slug:'', logo_url:'', description:'', sector:'', stage:'seed', headquarters_city:'', headquarters_state:'', founded_year:'', founders:[], total_funding_usd:'', last_valuation_usd:'', employee_count_range:'', website_url:'' };

    document.getElementById('admin-content').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <h1 style="margin:0;">${isNew ? 'New company' : escapeHtml(c.name) || 'Edit company'}</h1>
        <a href="/admin/companies.html" class="btn btn-ghost btn-sm">Back to companies</a>
      </div>
      <div id="msg-slot"></div>
      <div class="admin-card">
        <form id="co-form">
          <div class="form-row">
            <div class="form-field"><label>Name *</label><input type="text" name="name" required value="${escapeAttr(c.name)}"></div>
            <div class="form-field"><label>Slug *</label><input type="text" name="slug" required value="${escapeAttr(c.slug)}"></div>
          </div>
          <div class="form-field"><label>Logo URL</label><input type="url" name="logo_url" value="${escapeAttr(c.logo_url||'')}"></div>
          <div class="form-field"><label>Description</label><textarea name="description" rows="4">${escapeHtml(c.description||'')}</textarea></div>
          <div class="form-row">
            <div class="form-field"><label>Sector</label><input type="text" name="sector" value="${escapeAttr(c.sector||'')}" placeholder="Fintech / SaaS / D2C / AI…"></div>
            <div class="form-field"><label>Stage</label>
              <select name="stage">
                ${['idea','seed','series_a','series_b','series_c','series_d_plus','late_stage','public','acquired'].map(s => `<option value="${s}" ${s === c.stage ? 'selected' : ''}>${s.replace(/_/g, ' ')}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>HQ City</label><input type="text" name="headquarters_city" value="${escapeAttr(c.headquarters_city||'')}"></div>
            <div class="form-field"><label>HQ State</label><input type="text" name="headquarters_state" value="${escapeAttr(c.headquarters_state||'')}"></div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Founded year</label><input type="number" name="founded_year" value="${c.founded_year||''}"></div>
            <div class="form-field"><label>Website URL</label><input type="url" name="website_url" value="${escapeAttr(c.website_url||'')}"></div>
          </div>
          <div class="form-field">
            <label>Founders</label>
            <div class="tag-input-wrap" id="founders-wrap">
              <input type="text" id="founder-input" placeholder="Type a name and press Enter">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field"><label>Total funding (USD)</label><input type="number" step="any" name="total_funding_usd" value="${c.total_funding_usd||''}"></div>
            <div class="form-field"><label>Last valuation (USD)</label><input type="number" step="any" name="last_valuation_usd" value="${c.last_valuation_usd||''}"></div>
          </div>
          <div class="form-field"><label>Employee count range</label><input type="text" name="employee_count_range" value="${escapeAttr(c.employee_count_range||'')}" placeholder="11-50 / 51-200 / 201-500…"></div>

          <div style="display:flex;gap:10px;margin-top:14px;">
            <button type="submit" class="btn btn-primary">${isNew ? 'Create company' : 'Save changes'}</button>
            ${!isNew ? `<button type="button" class="btn btn-danger" id="del-btn">Delete</button>` : ''}
          </div>
        </form>
      </div>`;

    // Founders as tags
    const foundersWrap = document.getElementById('founders-wrap');
    const founderInput = document.getElementById('founder-input');
    let founders = (c.founders || []).slice();
    function renderFounders() {
      foundersWrap.querySelectorAll('.tag-chip-removable').forEach(n => n.remove());
      founders.forEach((f, i) => {
        const chip = document.createElement('span');
        chip.className = 'tag-chip-removable';
        chip.innerHTML = `${escapeHtml(f)} <button type="button" data-i="${i}">×</button>`;
        foundersWrap.insertBefore(chip, founderInput);
        chip.querySelector('button').addEventListener('click', () => { founders.splice(i, 1); renderFounders(); });
      });
    }
    renderFounders();
    founderInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        const v = founderInput.value.trim();
        if (v) { founders.push(v); founderInput.value = ''; renderFounders(); }
      }
    });

    // Auto-slug
    const form = document.getElementById('co-form');
    const nameInput = form.name;
    const slugInput = form.slug;
    let slugTouched = !!c.slug;
    slugInput.addEventListener('input', () => { slugTouched = true; });
    nameInput.addEventListener('input', () => { if (!slugTouched) slugInput.value = slugify(nameInput.value); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const payload = {
        name: fd.get('name').trim(),
        slug: (fd.get('slug') || slugify(fd.get('name'))).trim(),
        logo_url: fd.get('logo_url') || null,
        description: fd.get('description') || null,
        sector: fd.get('sector') || null,
        stage: fd.get('stage') || null,
        headquarters_city: fd.get('headquarters_city') || null,
        headquarters_state: fd.get('headquarters_state') || null,
        founded_year: fd.get('founded_year') ? Number(fd.get('founded_year')) : null,
        website_url: fd.get('website_url') || null,
        founders: founders.length ? founders : null,
        total_funding_usd: fd.get('total_funding_usd') ? Number(fd.get('total_funding_usd')) : null,
        last_valuation_usd: fd.get('last_valuation_usd') ? Number(fd.get('last_valuation_usd')) : null,
        employee_count_range: fd.get('employee_count_range') || null
      };
      const msg = document.getElementById('msg-slot');
      try {
        if (isNew) {
          const { data, error } = await sb.from('companies').insert(payload).select('id').single();
          if (error) throw error;
          location.href = `/admin/company-edit.html?id=${data.id}`;
        } else {
          const { error } = await sb.from('companies').update(payload).eq('id', id);
          if (error) throw error;
          msg.innerHTML = `<div class="form-msg success">Saved.</div>`;
          showToast('Saved');
        }
      } catch (err) {
        msg.innerHTML = `<div class="form-msg error">${escapeHtml(err.message)}</div>`;
      }
    });

    if (!isNew) {
      document.getElementById('del-btn').addEventListener('click', async () => {
        if (!confirm('Delete this company?')) return;
        try { await sb.from('companies').delete().eq('id', id); location.href = '/admin/companies.html'; }
        catch (e) { showToast(e.message, 'error'); }
      });
    }
  })();
  </script>
</body>
</html>
