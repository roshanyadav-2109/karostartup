<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Users · Admin · Karostartup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div id="admin-root"><div class="loading-state">Loading…</div></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script src="/admin/shell.js"></script>
  <script>
  (async () => {
    const ok = await requireStaff();
    if (!ok) return;
    const admin = await isAdmin();
    if (!admin) {
      document.body.innerHTML = '<div class="access-denied"><h1>Admins only</h1><p>This page is restricted to admins.</p><a href="/admin/" class="btn btn-primary">Back to dashboard</a></div>';
      return;
    }
    await renderAdminShell('users', 'Users');
    const me = await getCurrentUser();
    const myId = me?.id || '';

    const main = document.getElementById('admin-content');
    main.innerHTML = `
      <h1>Users</h1>
      <div class="admin-card" style="margin-bottom:18px;">
        <div class="admin-card-head"><h3>Add a user</h3></div>
        <div id="add-msg"></div>
        <form id="add-form" style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
          <div class="form-field" style="margin:0;flex:1;min-width:200px;"><label>Full name</label><input type="text" id="add-name" placeholder="Jane Doe"></div>
          <div class="form-field" style="margin:0;flex:1;min-width:220px;"><label>Email</label><input type="email" id="add-email" required placeholder="person@example.com"></div>
          <div class="form-field" style="margin:0;"><label>Role</label>
            <select id="add-role"><option value="reader">reader</option><option value="author">author</option><option value="editor">editor</option><option value="admin">admin</option></select>
          </div>
          <button type="submit" class="btn btn-primary" id="add-btn">Add user</button>
        </form>
      </div>
      <div class="admin-toolbar">
        <input type="search" id="search" class="search" placeholder="Search name, username or email…">
        <select id="role-filter"><option value="">All roles</option>
          <option value="reader">Reader</option><option value="author">Author</option><option value="editor">Editor</option><option value="admin">Admin</option>
        </select>
      </div>
      <div class="admin-card" style="padding:0;" id="slot"><div class="loading-state">Loading…</div></div>`;

    document.getElementById('add-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('add-name').value.trim();
      const email = document.getElementById('add-email').value.trim();
      const newRole = document.getElementById('add-role').value;
      const btn = document.getElementById('add-btn');
      const msg = document.getElementById('add-msg');
      if (!email) return;
      btn.disabled = true; btn.textContent = 'Adding…'; msg.innerHTML = '';
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) throw new Error('Your session expired — sign in again.');
        const r = await fetch('/api/admin/create-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
          body: JSON.stringify({ email, role: newRole, full_name: fullName }),
        });
        const j = await r.json();
        if (!r.ok || !j.ok) throw new Error(j.error || 'Could not add user');
        msg.innerHTML = `<div class="form-msg success">Added ${escapeHtml(j.full_name || j.email)} as ${escapeHtml(j.role)}.</div>`;
        document.getElementById('add-name').value = '';
        document.getElementById('add-email').value = '';
        load();
      } catch (err) {
        msg.innerHTML = `<div class="form-msg error">${escapeHtml(err.message || 'Could not add user')}</div>`;
      } finally {
        btn.disabled = false; btn.textContent = 'Add user';
      }
    });

    let q = '', role = '', searchTimer;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { q = e.target.value.trim(); load(); }, 300);
    });
    document.getElementById('role-filter').addEventListener('change', (e) => { role = e.target.value; load(); });

    async function load() {
      const slot = document.getElementById('slot');
      slot.innerHTML = '<div class="loading-state">Loading…</div>';
      let qb = sb.from('profiles').select('*');
      if (q) { const s = q.replace(/[%_]/g, ''); qb = qb.or(`full_name.ilike.%${s}%,username.ilike.%${s}%,email.ilike.%${s}%`); }
      if (role) qb = qb.eq('role', role);
      qb = qb.order('created_at', { ascending: false }).limit(200);
      try {
        const { data } = await qb;
        if (!data || !data.length) { slot.innerHTML = '<div class="empty-state"><h3>No users match</h3></div>'; return; }
        slot.innerHTML = `
          <table class="admin-table">
            <thead><tr><th>User</th><th>Email</th><th>Username</th><th>Role</th><th>Plus</th><th>Joined</th><th></th></tr></thead>
            <tbody>${data.map(u => {
              const init = (u.full_name || u.username || '?').charAt(0).toUpperCase();
              const av = u.avatar_url
                ? `<img src="${escapeAttr(u.avatar_url)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">`
                : `<div style="width:32px;height:32px;border-radius:50%;background:#d10a11;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${escapeHtml(init)}</div>`;
              return `<tr data-id="${u.id}">
                <td><div style="display:flex;align-items:center;gap:10px;">${av}<strong>${escapeHtml(u.full_name || 'Unnamed')}</strong></div></td>
                <td style="font-size:0.82rem;">${escapeHtml(u.email || '—')}</td>
                <td>${escapeHtml(u.username || '—')}</td>
                <td><select data-role="${u.id}">
                  ${['reader','author','editor','admin'].map(r => `<option value="${r}" ${r === u.role ? 'selected' : ''}>${r}</option>`).join('')}
                </select></td>
                <td><label style="cursor:pointer;"><input type="checkbox" data-plus="${u.id}" ${u.is_plus_member ? 'checked' : ''}> Plus</label></td>
                <td class="mono" style="font-size:0.74rem;color:#5a5a5a;">${formatDate(u.created_at)}</td>
                <td><div style="display:flex;gap:12px;align-items:center;">
                  <button data-save="${u.id}" style="color:#0a7a3b;background:none;border:0;cursor:pointer;font-weight:600;">Save</button>
                  ${u.id === myId ? '<span style="color:#9a9a9a;font-size:0.74rem;">you</span>' : `<button data-del="${u.id}" data-email="${escapeAttr(u.email || '')}" style="color:#d10a11;background:none;border:0;cursor:pointer;font-weight:600;">Remove</button>`}
                </div></td>
              </tr>`;
            }).join('')}</tbody>
          </table>`;
        document.querySelectorAll('[data-save]').forEach(b => b.addEventListener('click', async () => {
          const id = b.dataset.save;
          const role = document.querySelector(`[data-role="${id}"]`).value;
          const plus = document.querySelector(`[data-plus="${id}"]`).checked;
          try { await sb.from('profiles').update({ role, is_plus_member: plus }).eq('id', id); showToast('Saved'); }
          catch (e) { showToast(e.message, 'error'); }
        }));
        document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
          const id = b.dataset.del;
          const email = b.dataset.email || 'this user';
          if (!confirm(`Remove ${email}? This permanently deletes their account.`)) return;
          try {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) throw new Error('Session expired — sign in again.');
            const r = await fetch('/api/admin/delete-user', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${session.access_token}` },
              body: JSON.stringify({ id }),
            });
            const j = await r.json();
            if (!r.ok || !j.ok) throw new Error(j.error || 'Could not remove user');
            showToast('Removed');
            load();
          } catch (e) { showToast(e.message, 'error'); }
        }));
      } catch (e) {
        slot.innerHTML = `<div class="empty-state"><p>${escapeHtml(e.message)}</p></div>`;
      }
    }
    load();
  })();
  </script>
</body>
</html>
