<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Loading… · Karostartup</title>
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="read-progress" id="read-progress"></div>
  <div id="chrome"></div>
  <main id="article-main">
    <div class="loading-state">Loading story…</div>
  </main>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script>
  // Returns ~5 lines of clean prose from the start of an article. Strips
  // markdown syntax (headings, bold, links, blockquotes) so the teaser
  // reads as flowing text — not as a giant H2 caused by an opening
  // "## Section" header.
  function teaserContent(md) {
    if (!md) return '';
    const plain = md
      .replace(/^#{1,6}\s+/gm, '')            // headings → plain
      .replace(/^>\s+/gm, '')                  // blockquote marker
      .replace(/^[-*]\s+/gm, '')               // bullets
      .replace(/\*\*([^*]+)\*\*/g, '$1')       // bold
      .replace(/\*([^*]+)\*/g, '$1')           // italic
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // links → text
      .replace(/^---+\s*$/gm, '')              // hr
      .replace(/\r?\n+/g, ' ')                 // collapse newlines into a single paragraph
      .replace(/\s+/g, ' ')
      .trim();
    const words = plain.split(' ');
    const cut = words.slice(0, 55).join(' ');
    return cut + (words.length > 55 ? '…' : '');
  }
  (async () => {
    document.body.dataset.page = 'article';
    const params = new URLSearchParams(location.search);
    const slug = params.get('slug');
    if (!slug) { document.title = 'Not found · Karostartup'; await mountChrome(''); mountFooter(); document.getElementById('article-main').innerHTML = '<div class="empty-state" style="padding:120px 24px;"><h3>Article not found</h3><p>The link you followed is missing a slug.</p><a href="/" class="btn btn-primary">Go home</a></div>'; return; }

    let article;
    try {
      const { data, error } = await sb.from('articles')
        .select('*, categories(name,slug), profiles!author_id(id,full_name,avatar_url,username,bio,twitter_handle,role)')
        .eq('slug', slug)
        .eq('status', 'published')
        .maybeSingle();
      if (error) throw error;
      article = data;
    } catch (e) { article = null; }

    await mountChrome(article?.categories?.slug || '');
    mountFooter();

    if (!article) {
      document.title = 'Not found · Karostartup';
      document.getElementById('article-main').innerHTML = '<div class="empty-state" style="padding:120px 24px;"><h3>Story not found</h3><p>This article may have been removed or is not yet published.</p><a href="/" class="btn btn-primary">Back to homepage</a></div>';
      return;
    }

    // SEO meta — NewsArticle + BreadcrumbList with the live article data
    const articleUrl = `${location.origin}/article/view.html?slug=${encodeURIComponent(article.slug)}`;
    const articleDesc = article.summary || article.subtitle || article.title;
    const authorName = article.profiles?.full_name || 'Karostartup';
    const breadcrumbItems = [
      { '@type': 'ListItem', position: 1, name: 'Home', item: location.origin + '/' },
    ];
    if (article.categories) {
      breadcrumbItems.push({
        '@type': 'ListItem', position: 2,
        name: article.categories.name,
        item: `${location.origin}/category/view.html?slug=${encodeURIComponent(article.categories.slug)}`,
      });
    }
    breadcrumbItems.push({ '@type': 'ListItem', position: breadcrumbItems.length + 1, name: article.title });

    setMeta({
      title: article.title,
      description: articleDesc,
      image: article.cover_image_url || null,
      type: 'article',
      url: articleUrl,
      canonical: articleUrl,
      keywords: (article.tags || []).join(', ') || null,
      article: {
        publishedTime: article.published_at,
        modifiedTime:  article.updated_at || article.published_at,
        author:        authorName,
        section:       article.categories?.name || null,
        tags:          article.tags || [],
      },
      jsonLd: [
        {
          '@context': 'https://schema.org',
          '@type': 'NewsArticle',
          headline: article.title,
          alternativeHeadline: article.subtitle || undefined,
          description: articleDesc,
          image: article.cover_image_url ? [article.cover_image_url] : undefined,
          datePublished: article.published_at,
          dateModified: article.updated_at || article.published_at,
          author: [{ '@type': 'Person', name: authorName }],
          publisher: {
            '@type': 'Organization',
            name: 'Karostartup',
            logo: { '@type': 'ImageObject', url: `${location.origin}/assets/og-logo.png` },
          },
          mainEntityOfPage: { '@type': 'WebPage', '@id': articleUrl },
          articleSection: article.categories?.name || undefined,
          keywords: (article.tags || []).join(', ') || undefined,
          wordCount: (article.content || '').split(/\s+/).length,
        },
        {
          '@context': 'https://schema.org',
          '@type': 'BreadcrumbList',
          itemListElement: breadcrumbItems,
        },
      ],
    });

    // Fire view counter. Increment the displayed value optimistically so
    // the reader sees their view counted immediately.
    article.view_count = (article.view_count || 0) + 1;
    sb.rpc('increment_article_views', { article_uuid: article.id })
      .then(({ error }) => {
        if (error) {
          // Surface in console only — don't bother the reader.
          console.warn('view counter RPC missing:', error.message);
        }
      })
      .catch(() => {});

    const user = await getCurrentUser();
    const profile = user ? await getCurrentProfile() : null;
    // Auth-wall: anonymous readers see a teaser then a signin prompt.
    // Signed-in users see everything regardless of is_premium.
    const isAuthWalled = !user;

    const author = article.profiles || {};
    const authorAvatar = author.avatar_url || defaultCover({title: author.full_name || 'A'});

    // Compute pill tag: BREAKING NEWS > TOP STORIES > LATEST UPDATE > none.
    // No other kicker/tag is shown — the article.kicker field is intentionally
    // ignored in the header to keep tag noise out of the layout.
    let pillTag = null;
    if (article.is_breaking) pillTag = 'BREAKING NEWS';
    else if (article.is_featured) pillTag = 'TOP STORIES';
    else if (article.updated_at && article.published_at) {
      const upd = new Date(article.updated_at).getTime();
      const pub = new Date(article.published_at).getTime();
      const now = Date.now();
      const editedAfterPub = upd - pub > 60 * 60 * 1000;            // >1h after publish
      const recent = now - upd < 24 * 60 * 60 * 1000;               // within last 24h
      if (editedAfterPub && recent) pillTag = 'LATEST UPDATE';
    }

    const main = document.getElementById('article-main');
    main.innerHTML = `
      <section class="article-hero">
        <div class="container">
          <div class="article-crumb">
            ${article.categories ? `<a href="/category/view.html?slug=${encodeURIComponent(article.categories.slug)}">${escapeHtml(article.categories.name.toUpperCase())}</a>` : ''}
            ${article.categories ? `<span class="crumb-dot">·</span>` : ''}
            <span class="crumb-read">${article.read_time_minutes || 5} MIN READ</span>
          </div>

          ${pillTag ? `<span class="article-pill" data-kind="${pillTag.toLowerCase().split(' ')[0]}"><span class="article-pill-dot"></span>${pillTag}</span>` : ''}

          <h1 class="article-title">${escapeHtml(article.title)}</h1>
          ${article.subtitle ? `<p class="article-subtitle">${escapeHtml(article.subtitle)}</p>` : ''}

          <div class="article-timeago">${timeAgo(article.published_at).toUpperCase()}</div>

          <div class="byline-row">
            <div class="byline-author">
              <span class="byline-by">By</span>
              <img src="${escapeAttr(authorAvatar)}" class="byline-avatar" alt="${escapeAttr(author.full_name || '')}">
              <span class="byline-name">${escapeHtml(author.full_name || 'Karostartup')}</span>
            </div>
            <div class="byline-actions">
              <button class="share-btn" data-share="mail" aria-label="Share by email">${ICON.mail}</button>
              <button class="share-btn" data-share="copy" aria-label="Copy link">${ICON.link}</button>
              <button class="share-btn" data-share="twitter" aria-label="Share on X">${ICON.twitter}</button>
              <button class="share-btn" data-share="facebook" aria-label="Share on Facebook">${ICON.facebook}</button>
              <button class="share-btn" data-share="threads" aria-label="Share on Threads">${ICON.threads}</button>
              <button class="share-btn" id="print-btn" aria-label="Print article" title="Print">${ICON.printer}</button>
              <button class="share-btn" id="bookmark-btn" aria-label="Bookmark" title="Bookmark">${ICON.bookmark}</button>
            </div>
          </div>
        </div>
      </section>

      ${article.cover_image_url ? `
        <div class="cover-img-wrap">
          <img src="${escapeAttr(article.cover_image_url)}" alt="${escapeAttr(article.title)}">
          ${article.cover_caption ? `<div class="cover-caption">${escapeHtml(article.cover_caption)}</div>` : ''}
        </div>` : ''}

      <article class="article-body" id="article-body">
        ${isAuthWalled
          ? `<div class="authwall-teaser">${renderMarkdown(teaserContent(article.content || ''))}</div>`
          : renderMarkdown(article.content || '')}
      </article>

      ${article.tags && article.tags.length ? `
        <div class="tags-row">
          ${article.tags.map(t => `<a class="tag-chip" href="/search.html?q=${encodeURIComponent(t)}">#${escapeHtml(t)}</a>`).join('')}
        </div>` : ''}

      <div id="companies-strip"></div>

      <div class="author-card">
        <img src="${escapeAttr(authorAvatar)}" class="author-card-avatar" alt="${escapeAttr(author.full_name || '')}">
        <div>
          <div class="author-card-name">${escapeHtml(author.full_name || 'Karostartup')}</div>
          <div class="author-card-role">${escapeHtml((author.role || '').replace(/^./, c => c.toUpperCase()))} ${author.twitter_handle ? `· <a href="https://twitter.com/${encodeURIComponent(author.twitter_handle.replace(/^@/, ''))}" target="_blank" rel="noopener">@${escapeHtml(author.twitter_handle.replace(/^@/, ''))}</a>` : ''}</div>
          <p class="author-card-bio">${escapeHtml(author.bio || 'Karostartup editorial team.')}</p>
        </div>
      </div>

      <section class="related-section">
        <h3 class="h-section" style="border-bottom:2px solid #0a0a0a;padding-bottom:12px;margin-bottom:24px;">Related stories</h3>
        <div class="related-grid" id="related-slot"></div>
      </section>

      <section class="comments-section">
        <h3>Comments</h3>
        <div id="comments-form-slot"></div>
        <div id="comments-list-slot"></div>
      </section>
    `;

    // Auth wall for anonymous readers — inline CTA below the teaser.
    // The login/signup modal only opens after the user clicks
    // "Read full article", not automatically on page load.
    if (isAuthWalled) {
      const teaser = document.querySelector('.authwall-teaser');
      if (teaser) {
        const cta = document.createElement('div');
        cta.className = 'authwall-inline';
        cta.innerHTML = `
          <p class="authwall-inline-lede">Free to read with a Karostartup account.</p>
          <button type="button" class="btn btn-red btn-lg" id="read-full-btn">Read full article</button>
          <p class="authwall-inline-foot">No card required · 30-second signup · You'll come right back here.</p>
        `;
        teaser.parentNode.insertBefore(cta, teaser.nextSibling);
      }

      const openAuthModal = () => {
        if (document.querySelector('.authwall-modal')) return;
        const next = encodeURIComponent(location.pathname + location.search);
        const wall = document.createElement('div');
        wall.className = 'authwall-modal';
        wall.innerHTML = `
          <div class="authwall-card">
            <button type="button" class="authwall-close" aria-label="Close">×</button>
            <span class="kicker">Continue reading</span>
            <h2>Sign in to read the full story</h2>
            <p>Karostartup is free to read — just create an account so we know who's reading. No paywall, no card required. Two clicks and you're in.</p>
            <div class="authwall-actions">
              <a class="btn btn-red" href="/auth/signup.html?next=${next}">Create a free account</a>
              <a class="btn btn-ghost" href="/auth/signin.html?next=${next}">I already have one</a>
            </div>
            <p class="authwall-foot">By creating an account you agree to our <a href="/terms.html">Terms</a> and <a href="/privacy.html">Privacy Policy</a>.</p>
          </div>`;
        document.body.appendChild(wall);
        document.body.style.overflow = 'hidden';
        const close = () => { wall.remove(); document.body.style.overflow = ''; };
        wall.querySelector('.authwall-close').addEventListener('click', close);
        wall.addEventListener('click', (e) => { if (e.target === wall) close(); });
        document.addEventListener('keydown', function esc(e) {
          if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
        });
      };
      const fullBtn = document.getElementById('read-full-btn');
      if (fullBtn) fullBtn.addEventListener('click', openAuthModal);
    }

    // Print button
    const printBtn = document.getElementById('print-btn');
    if (printBtn) printBtn.addEventListener('click', () => { document.body.dataset.url = location.href; window.print(); });

    // Mobile sticky share rail — always thumb-reachable while reading.
    const rail = document.createElement('div');
    rail.className = 'mobile-share-rail';
    rail.innerHTML = `
      <button class="icon-btn" data-share="twitter" aria-label="Share on X">${ICON.twitter}</button>
      <button class="icon-btn" data-share="linkedin" aria-label="Share on LinkedIn">${ICON.linkedin}</button>
      <button class="icon-btn" data-share="whatsapp" aria-label="Share on WhatsApp">${ICON.whatsapp}</button>
      <button class="icon-btn" data-share="copy" aria-label="Copy link">${ICON.copy}</button>
      <button class="icon-btn" id="rail-bookmark-btn" aria-label="Bookmark">${ICON.bookmark}</button>
    `;
    document.body.appendChild(rail);
    function handleShare(kind) {
      const url = encodeURIComponent(location.href);
      const title = encodeURIComponent(article.title);
      if (kind === 'twitter') window.open(`https://twitter.com/intent/tweet?text=${title}&url=${url}`, '_blank');
      else if (kind === 'linkedin') window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${url}`, '_blank');
      else if (kind === 'whatsapp') window.open(`https://api.whatsapp.com/send?text=${title}%20${url}`, '_blank');
      else if (kind === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank');
      else if (kind === 'threads') window.open(`https://www.threads.net/intent/post?text=${title}%20${url}`, '_blank');
      else if (kind === 'mail') window.location.href = `mailto:?subject=${title}&body=${url}`;
      else if (kind === 'copy') navigator.clipboard.writeText(location.href).then(() => showToast('Link copied'));
    }
    rail.querySelectorAll('[data-share]').forEach(btn => {
      btn.addEventListener('click', () => handleShare(btn.dataset.share));
    });
    // Mirror bookmark state into the rail
    const railBookmarkBtn = document.getElementById('rail-bookmark-btn');

    // Share buttons in the article header
    main.querySelectorAll('[data-share]').forEach(btn => {
      btn.addEventListener('click', () => handleShare(btn.dataset.share));
    });

    // Bookmark — keep both the byline button and the mobile rail button in sync
    const bookmarkBtn = document.getElementById('bookmark-btn');
    let bookmarked = false;
    const setBookmarkUI = (on) => {
      const icon = on ? ICON.bookmarkFill : ICON.bookmark;
      if (bookmarkBtn) { bookmarkBtn.innerHTML = icon; bookmarkBtn.classList.toggle('active', on); }
      if (railBookmarkBtn) { railBookmarkBtn.innerHTML = icon; railBookmarkBtn.classList.toggle('active', on); }
    };
    if (railBookmarkBtn) {
      railBookmarkBtn.addEventListener('click', () => bookmarkBtn?.click());
    }
    if (user) {
      try {
        const { data } = await sb.from('bookmarks').select('user_id').eq('user_id', user.id).eq('article_id', article.id).maybeSingle();
        bookmarked = !!data;
        setBookmarkUI(bookmarked);
      } catch {}
    }
    bookmarkBtn.addEventListener('click', async () => {
      if (!user) { location.href = `/auth/signin.html?next=${encodeURIComponent(location.pathname + location.search)}`; return; }
      try {
        if (bookmarked) {
          await sb.from('bookmarks').delete().eq('user_id', user.id).eq('article_id', article.id);
          setBookmarkUI(false);
          showToast('Removed from bookmarks');
        } else {
          await sb.from('bookmarks').insert({ user_id: user.id, article_id: article.id });
          setBookmarkUI(true);
          showToast('Saved to bookmarks');
        }
        bookmarked = !bookmarked;
      } catch (e) {
        showToast('Could not update bookmark', 'error');
      }
    });

    // Read progress
    const progress = document.getElementById('read-progress');
    function updateProgress() {
      const body = document.getElementById('article-body');
      if (!body) return;
      const rect = body.getBoundingClientRect();
      const total = body.offsetHeight - window.innerHeight;
      const scrolled = Math.max(0, -rect.top);
      const pct = Math.min(100, (scrolled / Math.max(1, total)) * 100);
      progress.style.width = `${pct}%`;
    }
    window.addEventListener('scroll', updateProgress, { passive: true });
    updateProgress();

    // Companies mentioned
    try {
      const { data: junction } = await sb.from('article_companies')
        .select('companies(name,slug,logo_url)')
        .eq('article_id', article.id);
      const slot = document.getElementById('companies-strip');
      if (junction && junction.length) {
        slot.innerHTML = `
          <div class="companies-strip">
            <h4>Companies mentioned</h4>
            <div class="companies-strip-list">
              ${junction.map(j => {
                const c = j.companies; if (!c) return '';
                const initial = (c.name || '?').charAt(0).toUpperCase();
                const logo = c.logo_url
                  ? `<img src="${escapeAttr(c.logo_url)}" class="company-logo" alt="${escapeAttr(c.name)}" style="border:0;background:transparent;">`
                  : `<span class="company-logo">${escapeHtml(initial)}</span>`;
                return `<a href="/company/view.html?slug=${encodeURIComponent(c.slug)}" class="company-chip">${logo}<span>${escapeHtml(c.name)}</span></a>`;
              }).join('')}
            </div>
          </div>`;
      }
    } catch {}

    // Related
    try {
      const { data } = await sb.from('articles')
        .select('id,slug,title,kicker,summary,cover_image_url,published_at,read_time_minutes,categories(name),profiles!author_id(full_name)')
        .eq('status', 'published')
        .eq('category_id', article.category_id)
        .neq('id', article.id)
        .order('published_at', { ascending: false })
        .limit(3);
      const slot = document.getElementById('related-slot');
      if (data && data.length) {
        slot.innerHTML = data.map(a => renderStoryCard(a, { small: true })).join('');
      } else {
        slot.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><p>No related stories yet.</p></div>';
      }
    } catch {}

    // COMMENTS
    async function loadComments() {
      const slot = document.getElementById('comments-list-slot');
      try {
        const { data } = await sb.from('comments')
          .select('id,parent_id,content,is_flagged,created_at,profiles(full_name,username,avatar_url)')
          .eq('article_id', article.id)
          .eq('is_deleted', false)
          .order('created_at', { ascending: true });
        if (!data || !data.length) {
          slot.innerHTML = '<div class="empty-state"><p>No comments yet. Be the first.</p></div>';
          return;
        }
        const parents = data.filter(c => !c.parent_id);
        const children = data.filter(c => c.parent_id);
        const render = (c, isReply = false) => {
          const p = c.profiles || {};
          const init = (p.full_name || p.username || '?').charAt(0).toUpperCase();
          const replies = children.filter(ch => ch.parent_id === c.id);
          return `
            <div class="comment ${isReply ? 'is-reply' : ''}" data-id="${c.id}">
              <div class="comment-avatar">${p.avatar_url ? `<img src="${escapeAttr(p.avatar_url)}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : escapeHtml(init)}</div>
              <div>
                <div class="comment-meta">
                  <span class="comment-author">${escapeHtml(p.full_name || p.username || 'Anonymous')}</span>
                  <span class="comment-time">${timeAgo(c.created_at)}</span>
                </div>
                <div class="comment-body">${escapeHtml(c.content)}</div>
                <div class="comment-actions">
                  <button data-action="flag" data-id="${c.id}">Flag</button>
                </div>
              </div>
            </div>
            ${replies.map(r => render(r, true)).join('')}`;
        };
        slot.innerHTML = parents.map(p => render(p)).join('');
        slot.querySelectorAll('[data-action=flag]').forEach(b => {
          b.addEventListener('click', async () => {
            try {
              await sb.from('comments').update({ is_flagged: true }).eq('id', b.dataset.id);
              showToast('Comment flagged for review');
            } catch { showToast('Could not flag comment', 'error'); }
          });
        });
      } catch {
        slot.innerHTML = '<div class="empty-state"><p>Could not load comments.</p></div>';
      }
    }

    const formSlot = document.getElementById('comments-form-slot');
    if (!user) {
      formSlot.innerHTML = `<div class="signin-prompt"><p style="margin:0 0 12px 0;">Sign in to join the conversation.</p><a href="/auth/signin.html?next=${encodeURIComponent(location.pathname + location.search)}" class="btn btn-ghost btn-sm">Sign in</a></div>`;
    } else {
      formSlot.innerHTML = `
        <form class="comment-form" id="comment-form">
          <textarea name="content" placeholder="Share your perspective…" required maxlength="2000"></textarea>
          <div class="comment-form-actions">
            <button type="submit" class="btn btn-primary btn-sm">Post comment</button>
          </div>
        </form>`;
      document.getElementById('comment-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const content = e.target.content.value.trim();
        if (!content) return;
        try {
          const { error } = await sb.from('comments').insert({ article_id: article.id, user_id: user.id, content });
          if (error) throw error;
          e.target.reset();
          showToast('Comment posted');
          loadComments();
        } catch (err) {
          showToast(err.message || 'Could not post comment', 'error');
        }
      });
    }
    loadComments();
  })();
  </script>
</body>
</html>
