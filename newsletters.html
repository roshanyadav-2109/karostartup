<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Newsletters · Karostartup</title>
  <meta name="description" content="Subscribe to the Karostartup newsletter for daily Indian startup news, funding rounds, founder interviews and market analysis — delivered free to your inbox.">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..900&family=JetBrains+Mono:wght@400..600&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" href="/assets/favicon.ico">
  <link rel="stylesheet" href="/assets/style.css">
  <!-- seo:meta -->
  <link rel="canonical" href="https://www.karostartup.com/newsletters">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta property="og:site_name" content="Karostartup">
  <meta property="og:locale" content="en_IN">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.karostartup.com/newsletters">
  <meta property="og:title" content="Newsletters">
  <meta property="og:description" content="Subscribe to the Karostartup newsletter for daily Indian startup news, funding rounds, founder interviews and market analysis — delivered free to your inbox.">
  <meta property="og:image" content="https://www.karostartup.com/assets/logo-wordmark.png">
  <meta property="og:image:alt" content="Karostartup">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@karo_startup">
  <meta name="twitter:title" content="Newsletters">
  <meta name="twitter:description" content="Subscribe to the Karostartup newsletter for daily Indian startup news, funding rounds, founder interviews and market analysis — delivered free to your inbox.">
  <meta name="twitter:image" content="https://www.karostartup.com/assets/logo-wordmark.png">
  <script type="application/ld+json">{"@context":"https://schema.org","@graph":[{"@type":"WebPage","name":"Newsletters","description":"Subscribe to the Karostartup newsletter for daily Indian startup news, funding rounds, founder interviews and market analysis — delivered free to your inbox.","url":"https://www.karostartup.com/newsletters","inLanguage":"en-IN","isPartOf":{"@type":"WebSite","name":"Karostartup","url":"https://www.karostartup.com"}},{"@type":"BreadcrumbList","itemListElement":[{"@type":"ListItem","position":1,"name":"Home","item":"https://www.karostartup.com"},{"@type":"ListItem","position":2,"name":"Newsletters","item":"https://www.karostartup.com/newsletters"}]}]}</script>
</head>
<body>
  <div id="chrome"></div>
  <main>
    <section class="about-hero">
      <div class="container">
        <span class="kicker">Newsletters</span>
        <h1>The Karostartup newsletters.</h1>
        <p class="dek" style="margin-top:16px;max-width:720px;">Free, paid, daily, weekly. Pick the cadence that fits your inbox.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="newsletter-grid" id="nl-grid">
          <div class="loading-state" style="grid-column:1/-1;">Loading newsletters…</div>
        </div>
      </div>
    </section>
  </main>
  <div id="footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/assets/app.js"></script>
  <script>
  (async () => {
    setMeta({
      title: 'Newsletters',
      description: 'Subscribe to Karostartup newsletters — Morning Brief, Weekly Funding Brief, Founder Memo, and more.',
      url: '/newsletters.html',
      type: 'website',
    });
    await mountChrome('');
    mountFooter();

    try {
      const { data } = await sb.from('newsletters').select('*').eq('active', true).order('cadence');
      const slot = document.getElementById('nl-grid');
      if (!data || !data.length) {
        slot.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><h3>No newsletters yet</h3><p>We\'re prepping the first issues. Check back soon.</p></div>';
        return;
      }
      slot.innerHTML = data.map(nl => `
        <div class="newsletter-card reveal" data-id="${nl.id}">
          <span class="cadence-pill">${escapeHtml(nl.cadence || '—')}</span>
          <h3>${escapeHtml(nl.name)}</h3>
          <p>${escapeHtml(nl.description || '')}</p>
          <form class="newsletter-form sub-form" data-id="${nl.id}">
            <input type="email" name="email" required placeholder="your@email.com" aria-label="Email">
            <button type="submit">Subscribe</button>
          </form>
          <div class="newsletter-msg" data-msg="${nl.id}"></div>
        </div>`).join('');
      initReveal();

      document.querySelectorAll('.sub-form').forEach(form => {
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const id = form.dataset.id;
          const email = form.email.value.trim();
          const msgEl = document.querySelector(`[data-msg="${id}"]`);
          msgEl.textContent = '';
          msgEl.className = 'newsletter-msg';
          try {
            const { error } = await sb.from('newsletter_subscribers').insert({ email, newsletter_id: id });
            if (error) {
              if (error.code === '23505') {
                msgEl.textContent = "Already subscribed.";
                msgEl.classList.add('success');
              } else {
                msgEl.textContent = error.message;
                msgEl.classList.add('error');
              }
            } else {
              msgEl.textContent = "You're in. Welcome.";
              msgEl.classList.add('success');
              form.reset();
            }
          } catch (err) {
            msgEl.textContent = err.message || 'Could not subscribe.';
            msgEl.classList.add('error');
          }
        });
      });
    } catch (e) {
      document.getElementById('nl-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><h3>Could not load newsletters</h3></div>';
    }
  })();
  </script>
</body>
</html>
